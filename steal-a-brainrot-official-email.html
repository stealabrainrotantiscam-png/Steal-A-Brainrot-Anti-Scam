<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steal a Brainrot — Official E-mail</title>
<style>
  :root{
    --blue: #2563eb;
    --blue-dark: #1d4ed8;
    --ink: #0f172a;
    --muted: #64748b;
    --line: #e6e9ef;
    --bg: #ffffff;
    --good: #16a34a;
    --good-bg: #f0fdf4;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    background:var(--bg);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
    color:var(--ink);
  }

  .card{
    width:100%;
    max-width:560px;
    text-align:center;
  }

  .badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:var(--good-bg);
    color:var(--good);
    font-size:13px;
    font-weight:600;
    padding:6px 14px;
    border-radius:999px;
    margin-bottom:22px;
    letter-spacing:.2px;
  }

  .badge svg{ width:14px; height:14px; flex-shrink:0; }

  h1{
    font-family: Arial, Helvetica, sans-serif;
    font-size:52px;
    line-height:1.2;
    font-weight:300;
    color:var(--blue);
    margin:0 0 12px;
    letter-spacing:-0.5px;
  }

  .sub{
    color:var(--muted);
    font-size:14.5px;
    margin:0 0 28px;
  }

  .code-box{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    background:#f7f8fa;
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 16px;
    margin-bottom:18px;
  }

  .code-box code{
    font-family:'SF Mono', Consolas, 'Courier New', monospace;
    font-size:15px;
    color:var(--ink);
    overflow-x:auto;
    white-space:nowrap;
    text-align:left;
  }

  .copy-btn{
    appearance:none;
    border:none;
    background:var(--blue);
    color:#fff;
    font-size:14px;
    font-weight:600;
    padding:10px 18px;
    border-radius:9px;
    cursor:pointer;
    transition:background .15s ease, transform .1s ease;
    flex-shrink:0;
  }

  .copy-btn:hover{ background:var(--blue-dark); }
  .copy-btn:active{ transform:scale(0.97); }
  .copy-btn:focus-visible{ outline:2px solid var(--blue-dark); outline-offset:2px; }

  .copy-btn.copied{ background:var(--good); }

  .footnote{
    display:flex;
    flex-direction:column;
    gap:6px;
    align-items:center;
    margin-top:24px;
  }

  .pill-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:center;
  }

  .pill{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:12.5px;
    font-weight:600;
    color:var(--muted);
    border:1px solid var(--line);
    border-radius:999px;
    padding:5px 12px;
  }

  .pill svg{ width:13px; height:13px; flex-shrink:0; }
  .pill.verify svg{ color:var(--good); }
  .pill.sammy svg{ color:var(--blue); }

  .inner{
    max-width:480px;
    margin:0 auto;
  }

  @media (max-width:700px){
    h1{ font-size:38px; }
  }

  @media (max-width:420px){
    h1{ font-size:30px; }
  }

  @media (max-width:360px){
    .code-box{ flex-direction:column; align-items:stretch; }
    .copy-btn{ width:100%; }
  }

</style>
</head>
<body>

  <div class="card">
    <span class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/><path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z"/></svg>
      Verified Official Contact
    </span>

    <h1>Steal a Brainrot<br>Anti-Scam E-mail</h1>
    <p class="sub">Use this adress on your Roblox account to recover stolen Brainrots.</p>

    <div class="inner">
    <div class="code-box">
      <code id="emailText">stealabrainrotantiscam@gmail.com</code>
      <button class="copy-btn" id="copyBtn" onclick="copyEmail()">Copy</button>
    </div>

    <div class="footnote">
      <div class="pill-row">
        <span class="pill verify">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
          Auto Verifies
        </span>
        <span class="pill sammy">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a8 8 0 0116 0v1"/></svg>
          Official Sammy E-mail
        </span>
      </div>
    </div>
    </div>
  </div>

<script>
function copyEmail(){
  const text = document.getElementById('emailText').textContent;
  const btn = document.getElementById('copyBtn');
  navigator.clipboard.writeText(text).then(() => {
    const original = btn.textContent;
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = original;
      btn.classList.remove('copied');
    }, 1500);
  });
}
</script>

</body>
</html>
